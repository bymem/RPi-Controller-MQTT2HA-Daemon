[mqtt]
host = 192.168.1.100
port = 1883
user = kiosk
password = yourpassword
discovery_prefix = homeassistant
base_topic = rpi2ha

[device]
name = Touch Panel
location = Living Room
# id is auto-derived from hostname if not set
# id = my-kiosk

[display]
# X11 (default). Swap for Wayland: wlopm --on \* / wlopm --off \*
on_command = xset -display :0 dpms force on
off_command = xset -display :0 dpms force off
# Brightness method: auto | dsi | ddcutil | none
# auto = try DSI backlight first, fall back to ddcutil, then disable
brightness_method = auto
# Only needed if auto-detect picks the wrong DSI backlight path
brightness_path =
brightness_max = 255

[browser]
# Command to run when the Refresh Browser button is pressed.
# Leave empty to disable the button entirely (it won't appear in HA).
refresh_command = systemctl --user restart kiosk.service

[system]
# How often to report system stats in seconds (minimum 60)
report_interval = 60
